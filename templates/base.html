<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Wishlist{% endblock %}</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d1d5db;
            --head: #eef2ff;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 1100px;
            margin: 24px auto;
            padding: 0 16px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }
        h1 {
            margin: 0 0 12px;
        }
        p {
            color: var(--muted);
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: var(--head);
            font-weight: 700;
        }
        .empty {
            color: var(--muted);
        }
        a {
            color: #1d4ed8;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        form {
            margin-top: 12px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font: inherit;
        }
        textarea {
            min-height: 90px;
        }
        .actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            border: 1px solid var(--border);
            background: #1d4ed8;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .error {
            color: #b91c1c;
            font-weight: 600;
        }
        .flash-list {
            list-style: none;
            padding: 0;
            margin: 0 0 12px;
        }
        .flash {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        .flash-success {
            background: #dcfce7;
            color: #166534;
        }
        .flash-error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flash-list">
                    {% for category, message in messages %}
                        <li class="flash flash-{{ category }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</div>
</body>
</html>
